<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ima2table4ppt</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="app">
    <header class="app-header">
      <span class="app-title">ima2table4ppt</span>
      <div class="header-tabs">
        <button class="tab active" id="tab-image" onclick="switchTab('image')">이미지 인식</button>
        <button class="tab" id="tab-figma" onclick="switchTab('figma')">Figma CSS</button>
      </div>
    </header>

    <main class="app-body">
      <!-- 왼쪽 패널 -->
      <section class="panel panel-left">

        <!-- 이미지 탭 -->
        <div id="pane-image">
          <div class="section-label">이미지 업로드</div>
          <div class="drop-zone" id="drop-zone">
            <div class="dz-icon">📂</div>
            <div class="dz-text">이미지를 드래그하거나 클릭하세요</div>
            <div class="dz-sub">JPG · PNG · BMP 지원 · Ctrl+V 클립보드 붙여넣기 OK</div>
          </div>

          <div id="img-section" style="display:none">
            <div class="toolbar">
              <span class="section-label" style="flex:1">구분선 편집</span>
              <button class="btn" id="btn-hline" onclick="setTool('hline')">― 가로선</button>
              <button class="btn" id="btn-vline" onclick="setTool('vline')">| 세로선</button>
              <button class="btn btn-danger" onclick="clearLines()">✕ 초기화</button>
            </div>
            <div class="img-wrap" id="img-wrap">
              <img id="preview-img" alt="uploaded table"/>
              <canvas id="line-canvas"></canvas>
            </div>
            <div class="toolbar" style="margin-top:8px">
              <button class="btn btn-primary" id="btn-recognize" onclick="doRecognize()">
                🔍 표 인식 시작
              </button>
              <button class="btn" onclick="resetImage()">↺ 초기화</button>
            </div>
          </div>

          <div id="ocr-status" class="status-bar" style="display:none"></div>
        </div>

        <!-- Figma CSS 탭 -->
        <div id="pane-figma" style="display:none">
          <div class="section-label">Figma CSS 붙여넣기</div>
          <textarea id="figma-input" class="figma-ta" placeholder="Figma에서 Copy as CSS 한 내용 붙여넣기…"></textarea>
          <div class="toolbar" style="margin-top:8px">
            <button class="btn btn-primary" onclick="parseFigmaCSS()">▶ 변환</button>
          </div>
          <div id="figma-status" class="status-bar" style="display:none"></div>
        </div>

        <hr class="divider"/>

        <!-- 디자인 템플릿 -->
        <div>
          <div class="toolbar" style="margin-bottom:8px">
            <span class="section-label" style="flex:1">디자인 템플릿</span>
            <button class="btn" onclick="saveTemplate()">💾 저장</button>
          </div>
          <div class="tpl-grid" id="tpl-grid"></div>
          <input class="tpl-name-input" id="tpl-name-input" placeholder="새 템플릿 이름…" value="내 템플릿"/>
        </div>
      </section>

      <!-- 오른쪽 패널 -->
      <section class="panel panel-right">
        <div class="toolbar" style="margin-bottom:8px">
          <span class="section-label" style="flex:1">미리보기</span>
          <button class="btn" id="btn-cell-edit" onclick="toggleCellEditor()" style="display:none">✏ 셀 편집</button>
          <button class="btn btn-primary" id="btn-copy" onclick="copyForPPT()" style="display:none">📋 Copy for PowerPoint</button>
        </div>

        <div class="cell-editor" id="cell-editor" style="display:none">
          <label>배경색<input type="color" id="ce-bg" value="#ffffff" oninput="applyCellStyle()"></label>
          <label>글자색<input type="color" id="ce-color" value="#111111" oninput="applyCellStyle()"></label>
          <label>크기(px)<input type="number" id="ce-size" value="9" min="6" max="32" oninput="applyCellStyle()"></label>
          <label>정렬
            <select id="ce-align" onchange="applyCellStyle()">
              <option value="center">가운데</option>
              <option value="left">왼쪽</option>
              <option value="right">오른쪽</option>
            </select>
          </label>
          <label>colspan<input type="number" id="ce-colspan" value="1" min="1" max="20" oninput="applyCellStyle()"></label>
          <label>rowspan<input type="number" id="ce-rowspan" value="1" min="1" max="20" oninput="applyCellStyle()"></label>
        </div>

        <div class="preview-area" id="preview-area">
          <div class="preview-empty">
            <div style="font-size:40px;margin-bottom:12px">📊</div>
            <div>이미지 업로드 또는 CSS 붙여넣기 후<br>표가 여기에 표시됩니다</div>
          </div>
        </div>

        <div id="copy-status" class="status-bar" style="display:none"></div>

        <details style="margin-top:8px">
          <summary class="section-label" style="cursor:pointer">생성된 HTML 보기</summary>
          <pre id="html-out" class="html-out"></pre>
        </details>
      </section>
    </main>
  </div>

  <script src="../node_modules/tesseract.js/dist/tesseract.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
